# CI + deploy for the portfolio site.
# Security posture:
#   - every action pinned to a full commit SHA (dependabot keeps them fresh)
#   - top-level permissions: read-only; deploy job gets exactly pages+id-token
#   - deploy uses OIDC (no long-lived tokens) and is gated on all checks
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # weekly: catches link rot and stale pins

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Validate HTML
        run: npx --yes html-validate@11.5.5 "*.html"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml --no-progress "*.html"
          fail: true

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Serve site
        run: |
          # python's http.server is single-threaded and serializes every
          # request, which tanks Lighthouse's performance score against a
          # page with dozens of small assets. A plain `serve`/http-server
          # process fixes that but breaks the robots.txt audit instead: Node's
          # default keepAliveTimeout (5s) drops idle connections mid-run, and
          # robots.txt is fetched late (well after the ~60s main audit), so
          # Chrome can reuse a connection the server already closed. This
          # wrapper raises keepAliveTimeout so the connection survives the
          # whole run. Stay on localhost: Chrome treats it as a secure context
          # even over plain HTTP (the is-on-https audit exempts it), which a
          # real-looking hostname over HTTP would not get.
          npm install --no-save serve-handler compression
          node .github/scripts/serve-for-ci.mjs . 8080 &
          npx --yes wait-on@8 --timeout 30000 http://localhost:8080/
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          configPath: lighthouserc.json
          uploadArtifacts: true

  security-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # gitleaks scans full history
          persist-credentials: false
      - name: Audit workflow security (zizmor)
        run: |
          pip install --quiet zizmor==1.26.1
          zizmor --min-severity medium .github/workflows/
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    # Containerized delivery is a showcase, not the deploy path -- GitHub
    # Pages only serves static files, so this never gates `deploy` below.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t cj-portfolio:ci .
      - name: Scan image (report HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cj-portfolio:ci
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Scan image (fail on CRITICAL)
        # HIGH is reported but not gated on: base-image CVEs regularly lag
        # their upstream fix by days/weeks and aren't actionable here, so
        # gating on them would make this job flaky for reasons unrelated to
        # this repo's own code. CRITICAL still fails the job.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cj-portfolio:ci
          severity: CRITICAL
          exit-code: "1"
      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_SHA_TAG: ghcr.io/cj-ting/cj_portfolio:${{ github.sha }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
          docker tag cj-portfolio:ci ghcr.io/cj-ting/cj_portfolio:latest
          docker tag cj-portfolio:ci "$IMAGE_SHA_TAG"
          docker push ghcr.io/cj-ting/cj_portfolio:latest
          docker push "$IMAGE_SHA_TAG"

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [html-validate, link-check, lighthouse, security-lint]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true # create the Pages site on first deploy
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
