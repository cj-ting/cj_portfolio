<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; img-src 'self'; font-src 'self'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex">
  <title>404 — Christopher Ting</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <main class="section">
    <div class="container">
      <div class="term">
        <div class="term__bar"><span class="term__dot"></span><span class="term__dot"></span><span class="term__dot"></span><span class="term__title">cj@ops:~</span></div>
        <div class="term__body">
          <p class="term__line"><span class="term__prompt">$</span> <span class="term__cmd">cat /var/www/that-page.html</span></p>
          <p class="term__out">cat: /var/www/that-page.html: No such file or directory (404)</p>
          <p class="term__line"><span class="term__prompt">$</span> <span class="term__cmd">cd ~</span></p>
          <p class="term__out"><a href="./">← back to the homepage</a></p>
          <p class="term__line"><span class="term__prompt">$</span> <span class="term__cursor" aria-hidden="true"></span></p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
